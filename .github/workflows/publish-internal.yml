name: Publish to Internal NPM (GitHub Packages)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on:
      group: internet
      labels: [dedicated, Linux, X64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Add GitHub Package Token
        run: echo "//npm.pkg.github.com/:_authToken=${{ secrets.GH_WEB_PACKAGES_TOKEN }}" > ~/.npmrc

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_WEB_PACKAGES_TOKEN }}

      - name: Configure git config
        run: |
          git config --global user.email 'engineering@banksalad.com'
          git config --global user.name 'Banksalad Engineering'

      - name: Build Package
        run: pnpm --filter @banksalad/overlay-kit run build

      - name: Publish to GitHub Packages
        run: |
          cd packages
          npm publish
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GH_WEB_PACKAGES_TOKEN }}
