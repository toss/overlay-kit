# NOTE: Disabled in favor of publish-internal.yml for GitHub Packages
# This workflow was used for public npm publishing via changesets
name: Changesets PR or Publish (DISABLED)

on:
  workflow_dispatch: # Manual trigger only, disabled auto-publish
  # push:
  #   branches: [main, beta]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install

      - name: Build Package
        run: pnpm --filter @banksalad/overlay-kit run build

      - name: Create Changesets Pull Request or Publish to NPM
        uses: changesets/action@v1
        with:
          title: 'chore: version packages'
          commit: 'chore: version packages'
          version: pnpm changeset:version
          publish: pnpm changeset:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
